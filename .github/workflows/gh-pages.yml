name: Deploy Hugo site to GitHub Pages (debug)

on:
  push:
    branches:
      - dev
      - release
  workflow_dispatch:
    inputs:
      branch:
        description: '分支名称（默认 release）'
        required: false
        default: 'release'
      deploy:
        description: '是否部署到 Pages (true/false)'
        required: false
        default: 'true'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build Hugo site (debug)
    runs-on: ubuntu-latest

    env:
      ACTIONS_STEP_DEBUG: true
      ACTIONS_RUNNER_DEBUG: true

    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}

    steps:
      # 1. checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}
          submodules: recursive
          fetch-depth: 0

      # 🔍 Debug：基本信息
      - name: Debug - context info
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref_name=${{ github.ref_name }}"
          echo "input_branch=${{ github.event.inputs.branch }}"
          echo "actor=${{ github.actor }}"

      # 2. Hugo（对齐本地）
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.0'
          extended: true

      # 🔍 Debug：Hugo版本
      - name: Debug - Hugo version
        run: hugo version

      # 3. Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 🔍 Debug：Node/npm
      - name: Debug - Node & npm
        run: |
          node -v
          npm -v
          npm config get cache

      # 🔍 Debug：检查 lock 文件
      - name: Debug - check lock file
        run: |
          ls -al
          test -f package-lock.json && echo "lock file exists" || echo "❌ NO LOCK FILE"

      # 4. 安装依赖
      - name: Install npm dependencies
        run: npm ci

      # 5. Go proxy（可选）
      - name: Setup Go proxy
        run: |
          echo "GOPROXY=https://goproxy.cn,direct" >> $GITHUB_ENV
          echo "GOSUMDB=sum.golang.google.cn" >> $GITHUB_ENV

      # 🔍 Debug：Hugo config
      - name: Debug - Hugo config
        run: hugo config

      # 6. 构建（🔥 增加 verbose）
      - name: Build Hugo site (verbose)
        run: |
          CURRENT_BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          echo "Building branch: $CURRENT_BRANCH"

          if [[ "$CURRENT_BRANCH" == "release" ]]; then
            hugo --minify --gc --logLevel debug --printPathWarnings --printUnusedTemplates
          else
            hugo --logLevel debug --printPathWarnings --printUnusedTemplates
          fi

      # 🔍 Debug：构建结果
      - name: Debug - build output
        run: |
          echo "==== public dir ===="
          ls -al public || echo "❌ public not found"

      # 7. 上传
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      # 8. 判断部署
      - name: Check deploy
        id: check
        run: |
          DEPLOY="false"
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == "release" ]]; then
            DEPLOY="true"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.deploy }}" == "true" ]]; then
            DEPLOY="true"
          fi
          echo "should_deploy=$DEPLOY" >> $GITHUB_OUTPUT
          echo "Deploy decision: $DEPLOY"

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.should_deploy == 'true'

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
