# ============================================================
# GitHub Actions 工作流：Hugo 站点构建与部署（适配 dev/main/release 分支模型）
# ============================================================
# 分支策略说明：
#   - dev       : 开发集成分支，仅构建测试，不部署
#   - main      : 稳定生产分支，不直接触发部署（仅用于合并与拉 release）
#   - release   : 发布分支，构建并部署到 GitHub Pages
#   - feature/* : 功能分支，不触发任何操作（可在 PR 中手动触发测试）
# ============================================================

name: Deploy Hugo site to GitHub Pages

# 触发条件
on:
  push:
    branches:
      - dev          # 开发分支：仅构建，不部署
      - release      # 发布分支：构建 + 部署
  # 手动触发（可用于测试 feature 分支或重新部署）
  workflow_dispatch:
    inputs:
      branch:
        description: '分支名称（默认 release）'
        required: false
        default: 'release'
      deploy:
        description: '是否部署到 Pages (true/false)'
        required: false
        default: 'true'

# 权限配置（必须，用于部署到 GitHub Pages）
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制
concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  # ---------- 构建任务 ----------
  build:
    name: Build Hugo site
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check_deploy.outputs.should_deploy }}
    steps:
      # 1. 检出代码（支持子模块）
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}
          submodules: recursive
          fetch-depth: 0

      # 2. 安装 Hugo Extended（必须）
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.129.0'
          extended: true

      # 3. 安装 Node.js 与依赖（Docsy 需要 PostCSS）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: |
          # 如果使用国内镜像可取消注释
          # npm config set registry https://registry.npmmirror.com
          npm ci || npm install

      # 4. 设置 Go 代理（Hugo Modules 下载加速）
      - name: Setup Go proxy
        run: |
          echo "GOPROXY=https://goproxy.cn,direct" >> $GITHUB_ENV
          echo "GOSUMDB=sum.golang.google.cn" >> $GITHUB_ENV

      # 5. 构建站点（根据分支决定是否压缩）
      - name: Build Hugo site
        run: |
          CURRENT_BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          if [[ "$CURRENT_BRANCH" == "release" ]]; then
            hugo --minify   # 生产环境压缩
          else
            hugo            # 开发/测试环境不压缩
          fi

      # 6. 上传构建产物（供部署任务使用）
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      # 7. 判断是否需要部署（输出给 deploy 任务）
      - name: Check whether to deploy
        id: check_deploy
        run: |
          DEPLOY_FLAG="false"
          # 如果是 release 分支，或者手动触发且 deploy 参数为 true
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == "release" ]]; then
            DEPLOY_FLAG="true"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.deploy }}" == "true" ]]; then
            DEPLOY_FLAG="true"
          fi
          echo "should_deploy=$DEPLOY_FLAG" >> $GITHUB_OUTPUT

  # ---------- 部署任务 ----------
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    # 只有当需要部署时才执行
    if: needs.build.outputs.should_deploy == 'true'
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
